<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Колледж Фаберже</title>
  <meta name="description" content="Сайт Колледжа Фаберже — в разработке." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --fg: #f1ebdd;
      --accent: #c8a572;
      --muted: rgba(241, 235, 221, 0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(24px, 4vw, 48px);
      position: relative;
    }
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(200, 165, 114, 0.08), transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(200, 165, 114, 0.05), transparent 50%);
      pointer-events: none;
    }
    header, main, footer { position: relative; z-index: 1; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .mark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: none;
      color: var(--fg);
    }
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      max-width: 880px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(44px, 9vw, 128px);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .tagline {
      margin-top: clamp(20px, 3vw, 32px);
      font-size: clamp(15px, 1.4vw, 18px);
      max-width: 520px;
      line-height: 1.55;
      color: var(--muted);
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    a { color: var(--fg); text-decoration: none; border-bottom: 1px solid rgba(241, 235, 221, 0.25); }
    a:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <span class="mark">Колледж Фаберже</span>
      <span>Санкт-Петербург</span>
    </header>

    <main>
      <h1>Сайт <em>в разработке</em></h1>
      <p class="tagline">
        Готовим новое цифровое пространство колледжа — о специальностях, приёмной кампании, жизни и истории. Скоро здесь появится всё самое важное.
      </p>
    </main>

    <footer>
      <span class="status"><span class="dot"></span>В работе</span>
      <span>© <span id="year"></span></span>
    </footer>
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
